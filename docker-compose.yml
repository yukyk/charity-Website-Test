services:
  app:
    build: .
    container_name: givehope_app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file: .env
    environment:
      # Override DB_HOST so the app finds the MySQL container by its service name
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: givehope_db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_NAME:-givehope_db}
      MYSQL_USER: ${DB_USER:-givehope}
      MYSQL_PASSWORD: ${DB_PASSWORD:-givehope_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root",
             "--password=${MYSQL_ROOT_PASSWORD:-root_password}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./views
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000/api/v1}
        VITE_RAZORPAY_KEY: ${VITE_RAZORPAY_KEY:-rzp_test_xxxxxx}
    container_name: givehope_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - app

volumes:
  mysql_data:
